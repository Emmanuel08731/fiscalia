<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SPOA | Panel de Control Emma</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f7; margin: 0; display: flex; }
        .sidebar { width: 300px; background: #000; color: #fff; height: 100vh; padding: 40px 20px; box-sizing: border-box; }
        .main { flex: 1; padding: 50px; overflow-y: auto; }
        .admin-card { background: #fff; padding: 30px; border-radius: 24px; margin-bottom: 30px; border: 1px solid #d2d2d7; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #f5f5f7; }
        .btn-blue { background: #0071e3; color: #fff; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Panel Maestro</h2>
        <p>Fiscal: <b>Emma</b></p>
        <hr><br>
        <button onclick="location.href='dashboard.html'" style="cursor:pointer; width: 100%;">Volver a mi Dashboard</button>
    </div>

    <div class="main">
        <h1>Control Global de Procesos</h1>

        <div class="admin-card">
            <h3>📢 Publicar Objetivo (Buscados)</h3>
            <input type="text" id="b-alias" placeholder="Alias">
            <input type="text" id="b-delito" placeholder="Delito">
            <input type="text" id="b-recom" placeholder="Recompensa ($)">
            <button class="btn-blue" onclick="subirBuscado()">Publicar Ahora</button>
        </div>

        <div class="admin-card">
            <h3>👥 Ciudadanos Registrados</h3>
            <table id="table-users">
                <thead><tr><th>Nombre</th><th>Cédula</th><th>Rango</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadMaster() {
            const res = await fetch('/api/admin/global');
            const data = await res.json();
            
            document.querySelector('#table-users tbody').innerHTML = data.users.map(u => `
                <tr><td>${u.nombre} ${u.apellido}</td><td>${u.cedula}</td><td><b>${u.rango}</b></td></tr>
            `).join('');
        }

        async function subirBuscado() {
            await fetch('/api/admin/buscados', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    alias: document.getElementById('b-alias').value,
                    delito: document.getElementById('b-delito').value,
                    recompensa: document.getElementById('b-recom').value
                })
            });
            alert("Objetivo publicado en la web oficial.");
            location.reload();
        }
        loadMaster();
    </script>
</body>
</html>
