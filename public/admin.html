<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SPOA | Central de Inteligencia</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 40px; }
        .stat-card { background: #1c1c1e; padding: 30px; border-radius: 24px; border: 1px solid #333; }
        .stat-card h2 { color: #0a84ff; margin: 0; font-size: 32px; }
        .table-container { background: #1c1c1e; border-radius: 24px; margin-top: 40px; padding: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #86868b; padding: 15px; border-bottom: 1px solid #333; }
        td { padding: 15px; border-bottom: 1px solid #2c2c2e; }
        .badge-admin { background: #ff375f; color: #fff; padding: 5px 12px; border-radius: 8px; font-size: 12px; }
        .btn-logout { background: #ff453a; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>FISCALÍA - PANEL DE CONTROL</h1>
        <div>
            <span id="admin-name" style="margin-right: 20px; color: #0a84ff;"></span>
            <button class="btn-logout" onclick="location.href='login.html'">Cerrar Terminal</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Ciudadanos</h3><h2 id="count-users">--</h2></div>
        <div class="stat-card"><h3>Ordenes de Captura</h3><h2 style="color: #ff9f0a;">12</h2></div>
        <div class="stat-card"><h3>Casos Abiertos</h3><h2 style="color: #32d74b;">5</h2></div>
        <div class="stat-card"><h3>Alertas</h3><h2 style="color: #ff375f;">Crítica</h2></div>
    </div>

    <div class="table-container">
        <h3>Base de Datos de Ciudadanos</h3>
        <table id="user-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Cédula</th>
                    <th>Rango</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="user-list">
                </tbody>
        </table>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.rango !== 'Admin') {
            alert("ACCESO DENEGADO - SOLO PERSONAL AUTORIZADO");
            window.location.href = 'login.html';
        }
        document.getElementById('admin-name').innerText = "Agente: " + user.nombre;

        async function loadAdminData() {
            // Aquí llamarías a una ruta de admin para ver a todos
            // Por ahora mostramos al admin actual
            document.getElementById('user-list').innerHTML = `
                <tr>
                    <td>${user.nombre} ${user.apellido}</td>
                    <td>${user.cedula}</td>
                    <td><span class="badge-admin">${user.rango}</span></td>
                    <td style="color: #32d74b;">En Línea</td>
                </tr>
            `;
        }
        loadAdminData();
    </script>
</body>
</html>
