<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SPOA | Acceso Judicial</title>
    <style>
        :root { --apple-blue: #0071e3; --bg: #f5f5f7; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-container { background: #fff; padding: 50px; border-radius: 30px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.06); text-align: center; }
        h1 { font-size: 32px; letter-spacing: -1px; margin-bottom: 10px; }
        p { color: #86868b; margin-bottom: 30px; font-size: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 15px; }
        input, select { padding: 16px; border: 1px solid #d2d2d7; border-radius: 14px; font-size: 16px; background: #fbfbfd; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--apple-blue); background: #fff; }
        .btn-submit { background: var(--apple-blue); color: #fff; border: none; padding: 18px; border-radius: 14px; font-weight: 600; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.9; }
        .toggle-link { margin-top: 25px; font-size: 14px; color: var(--apple-blue); cursor: pointer; font-weight: 500; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="ui-title">SPOA</h1>
        <p id="ui-desc">Ingrese sus credenciales ciudadanas</p>
        
        <div class="form-group">
            <div id="register-only" class="hidden">
                <div class="grid-2">
                    <input type="text" id="nom" placeholder="Nombre">
                    <input type="text" id="ape" placeholder="Apellido">
                </div>
                <div class="grid-2" style="margin-top: 15px;">
                    <input type="number" id="eda" placeholder="Edad">
                    <select id="san">
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="B+">B+</option>
                    </select>
                </div>
                <input type="text" id="nac" placeholder="Nacionalidad" value="Colombiana" style="margin-top: 15px;">
            </div>
            
            <input type="text" id="ced" placeholder="Número de Cédula">
            <input type="password" id="pass" placeholder="Contraseña">
            
            <button class="btn-submit" onclick="submitAuth()">Continuar</button>
        </div>

        <div class="toggle-link" onclick="toggleMode()" id="ui-toggle">¿No tiene una cuenta? Regístrese</div>
    </div>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('ui-title').innerText = isLogin ? "SPOA" : "Registro";
            document.getElementById('ui-desc').innerText = isLogin ? "Ingrese sus credenciales ciudadanas" : "Cree su perfil en la base de datos";
            document.getElementById('register-only').classList.toggle('hidden');
            document.getElementById('ui-toggle').innerText = isLogin ? "¿No tiene una cuenta? Regístrese" : "¿Ya tiene cuenta? Inicie sesión";
        }

        async function submitAuth() {
            const data = {
                action: isLogin ? 'login' : 'register',
                nombre: document.getElementById('nom').value,
                apellido: document.getElementById('ape').value,
                cedula: document.getElementById('ced').value,
                password: document.getElementById('pass').value,
                edad: document.getElementById('eda').value,
                sangre: document.getElementById('san').value,
                nacionalidad: document.getElementById('nac').value
            };

            const response = await fetch('/api/auth/handler', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (result.success) {
                if (isLogin) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert("¡Ciudadano registrado!");
                    location.reload();
                }
            } else {
                alert("Error: " + result.error);
            }
        }
    </script>
</body>
</html>
