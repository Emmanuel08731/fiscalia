<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SPOA | Fiscalía</title>
    <style>
        :root { --accent: #0071e3; --bg: #f5f5f7; }
        body { background: var(--bg); font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); padding: 50px; border-radius: 40px; width: 450px; box-shadow: 0 30px 100px rgba(0,0,0,0.1); border: 1px solid #fff; }
        h1 { font-size: 42px; letter-spacing: -2px; margin-bottom: 5px; color: #1d1d1f; }
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        input, select { padding: 18px; border-radius: 16px; border: 1px solid #d2d2d7; font-size: 16px; background: rgba(255,255,255,0.5); outline: none; transition: 0.4s; }
        input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 600; font-size: 18px; cursor: pointer; margin-top: 20px; }
        .btn-main:hover { transform: scale(1.02); }
        .toggle { margin-top: 25px; cursor: pointer; color: var(--accent); font-weight: 500; font-size: 14px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1 id="title">SPOA</h1>
        <p id="desc" style="color: #86868b;">Sistema Penal Oral Acusatorio</p>
        
        <div class="input-group">
            <div id="reg-fields" class="hidden">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="nom" placeholder="Nombre">
                    <input type="text" id="ape" placeholder="Apellido">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
                    <input type="number" id="eda" placeholder="Edad">
                    <select id="san"><option>O+</option><option>O-</option><option>A+</option></select>
                </div>
                <input type="password" id="adm" placeholder="Código de Rango (Opcional)" style="margin-top:10px; border-style: dashed;">
            </div>
            
            <input type="text" id="ced" placeholder="Cédula de Ciudadanía">
            <input type="password" id="pas" placeholder="Contraseña">
            
            <button class="btn-main" onclick="process()">Acceder al Sistema</button>
        </div>
        <p class="toggle" onclick="toggle()">¿Eres un nuevo ciudadano? Regístrate</p>
    </div>

    <script>
        let isLogin = true;
        function toggle() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "SPOA" : "Registro Civil";
            document.getElementById('reg-fields').classList.toggle('hidden');
        }

        async function process() {
            const payload = {
                action: isLogin ? 'login' : 'register',
                nombre: document.getElementById('nom').value,
                apellido: document.getElementById('ape').value,
                cedula: document.getElementById('ced').value,
                password: document.getElementById('pas').value,
                edad: document.getElementById('eda').value,
                sangre: document.getElementById('san').value,
                adminCode: document.getElementById('adm').value
            };

            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
                if (isLogin) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // REDIRECCIÓN INTELIGENTE
                    window.location.href = data.user.rango === 'Admin' ? 'admin.html' : 'dashboard.html';
                } else {
                    alert("¡Registrado! Ya puedes iniciar sesión.");
                    location.reload();
                }
            } else { alert("Error: " + data.error); }
        }
    </script>
</body>
</html>
