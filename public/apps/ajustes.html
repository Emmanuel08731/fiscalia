<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ajustes de Usuario</title>
    <style>
        /* Mantenemos tu estilo Apple original */
        body { 
            background: #e5e5e7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: -apple-system, sans-serif; 
        }

        .phone-screen { 
            width: 420px; 
            height: 860px; 
            background: #f2f2f7; 
            border: 14px solid #1a1a1a; 
            border-radius: 65px; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
        }

        /* Cabecera iOS */
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            padding: 55px 20px 15px;
            border-bottom: 0.5px solid #d1d1d6;
        }

        .back-nav { color: #007aff; text-decoration: none; font-size: 17px; cursor: pointer; margin-bottom: 10px; display: block; }
        h1 { margin: 0; font-size: 32px; font-weight: 700; }

        /* Contenido Scrolleable */
        .content { padding: 20px 16px; overflow-y: auto; flex-grow: 1; }

        /* Tarjeta de Perfil Dinámica */
        .user-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .avatar {
            width: 60px; height: 60px;
            background: #8e8e93;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; font-weight: bold; margin-right: 15px;
        }

        /* Grupos de Información */
        .group-title { padding-left: 15px; margin-bottom: 8px; font-size: 13px; color: #6e6e73; text-transform: uppercase; }
        
        .info-group {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .row {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            border-bottom: 0.5px solid #f2f2f7;
            font-size: 17px;
        }

        .row:last-child { border-bottom: none; }
        .label { color: #000; }
        .value { color: #8e8e93; font-weight: 400; }

        .logout-btn {
            background: white;
            color: #ff3b30;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: block;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="header">
            <div class="back-nav" onclick="history.back()" id="txt_back">‹ Escritorio</div>
            <h1 id="txt_title">Ajustes</h1>
        </div>

        <div class="content">
            <div class="user-card">
                <div class="avatar" id="avatar_letter">?</div>
                <div>
                    <h2 id="disp_fullname" style="margin:0; font-size:20px;">Cargando...</h2>
                    <p style="margin:0; font-size:13px; color:gray;" id="txt_id_label">ID de Ciudadano</p>
                </div>
            </div>

            <div class="group-title" id="txt_sec_ic">Información Ciudadana</div>
            <div class="info-group">
                <div class="row">
                    <span class="label" id="lbl_nac">Nacionalidad</span>
                    <span class="value" id="val_nac">---</span>
                </div>
                <div class="row">
                    <span class="label" id="lbl_eda">Edad</span>
                    <span class="value" id="val_eda">---</span>
                </div>
                <div class="row">
                    <span class="label" id="lbl_san">Sangre</span>
                    <span class="value" id="val_san">---</span>
                </div>
            </div>

            <div class="group-title" id="txt_sec_ooc">Cuenta de Red</div>
            <div class="info-group">
                <div class="row">
                    <span class="label">Usuario</span>
                    <span class="value" id="val_usu">@---</span>
                </div>
                <div class="row">
                    <span class="label">Discord</span>
                    <span class="value" id="val_dis">---</span>
                </div>
            </div>

            <div class="logout-btn" onclick="logout()" id="txt_logout">Cerrar Sesión</div>
        </div>
    </div>

    <script>
        // 1. Obtener idioma de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'es';

        // 2. Función principal para cargar los datos del usuario logueado
        function loadUserData() {
            // Obtenemos los datos que guardamos en el login
            const userData = JSON.parse(localStorage.getItem('userRP'));

            if (!userData) {
                // Si no hay datos, significa que no ha iniciado sesión
                alert("No hay sesión activa. Por favor inicia sesión.");
                window.location.href = "../login.html";
                return;
            }

            // Rellenar la información en los Ajustes
            document.getElementById('disp_fullname').innerText = userData.nombre + " " + userData.apellido;
            document.getElementById('avatar_letter').innerText = userData.nombre.charAt(0).toUpperCase();
            document.getElementById('val_nac').innerText = userData.nacionalidad;
            document.getElementById('val_eda').innerText = userData.edad + (lang === 'es' ? " años" : " years");
            document.getElementById('val_san').innerText = userData.tipo_sangre;
            document.getElementById('val_usu').innerText = "@" + userData.usuario;
            document.getElementById('val_dis').innerText = userData.discord_user || "No vinculado";

            // Traducción rápida
            if (lang === 'en') {
                document.getElementById('txt_back').innerText = "‹ Desktop";
                document.getElementById('txt_title').innerText = "Settings";
                document.getElementById('txt_id_label').innerText = "Citizen Identity";
                document.getElementById('txt_sec_ic').innerText = "Citizen Information";
                document.getElementById('lbl_nac').innerText = "Nationality";
                document.getElementById('lbl_eda').innerText = "Age";
                document.getElementById('lbl_san').innerText = "Blood Type";
                document.getElementById('txt_sec_ooc').innerText = "Network Account";
                document.getElementById('txt_logout').innerText = "Sign Out";
            }
        }

        // Función para cerrar sesión
        function logout() {
            localStorage.removeItem('userRP'); // Borramos los datos
            window.location.href = "../login.html"; // Al login
        }

        // Ejecutar al cargar la página
        loadUserData();
    </script>
</body>
</html>
