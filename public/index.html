<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fiscalía General de la Nación</title>
    <style>
        :root { --blue: #003366; --gold: #ccad00; --apple-gray: #f5f5f7; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #1d1d1f; }
        
        nav {
            position: fixed; top: 0; width: 100%; height: 48px; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid #d2d2d7; z-index: 1000;
        }
        nav a { text-decoration: none; color: #1d1d1f; font-size: 12px; margin: 0 20px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; }
        .acc-btn { background: var(--blue); color: #fff !important; padding: 4px 12px; border-radius: 20px; font-weight: 500; opacity: 1 !important; }

        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #fff 0%, #f5f5f7 100%); }
        .hero img { width: 80px; margin-bottom: 20px; }
        .hero h1 { font-size: 56px; font-weight: 600; letter-spacing: -0.005em; margin: 0; }
        .hero h1 span { color: var(--gold); }
        .hero p { font-size: 24px; color: #86868b; max-width: 600px; margin-top: 15px; }

        .btn-group { margin-top: 40px; display: flex; gap: 20px; }
        .btn-blue { background: var(--blue); color: white; padding: 12px 24px; border-radius: 25px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="buscados.html">Buscados</a>
        <a href="denuncias.html">Denuncias</a>
        <a href="login.html" class="acc-btn">Acceder</a>
    </nav>

    <section class="hero">
        <img src="https://www.fiscalia.gov.co/colombia/wp-content/uploads/LogoFiscalia.jpg">
        <h1>La ley es <span>para todos.</span></h1>
        <p>Gestionamos la justicia penal con transparencia y tecnología de vanguardia.</p>
        <div class="btn-group">
            <a href="denuncias.html" class="btn-blue">Radicar Denuncia</a>
            <a href="buscados.html" style="color: var(--blue); text-decoration: none; font-weight: 600;">Ver Buscados →</a>
        </div>
    </section>
</body>
</html>
