<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SPOA | Mi Ficha</title>
    <style>
        body { background: #fff; font-family: -apple-system, sans-serif; margin: 0; }
        nav { padding: 20px 8%; border-bottom: 1px solid #d2d2d7; display: flex; justify-content: space-between; align-items: center; }
        .main-content { padding: 60px 8%; display: grid; grid-template-columns: 320px 1fr; gap: 50px; }
        .info-card { border: 1px solid #d2d2d7; border-radius: 24px; padding: 30px; }
        .status-box { background: #f5f5f7; border-radius: 18px; padding: 20px; margin-top: 20px; }
        .alert-red { background: #fff1f1; border: 1px solid #ff3b30; color: #d70015; border-radius: 18px; padding: 20px; margin-bottom: 20px; }
        .btn-admin { background: #000; color: #fff; padding: 12px; border-radius: 12px; text-decoration: none; display: block; text-align: center; margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <nav>
        <h2 style="font-size: 20px;">Fiscalía General de la Nación</h2>
        <button onclick="localStorage.clear(); location.href='login.html'">Salir</button>
    </nav>

    <div class="main-content">
        <div class="sidebar">
            <div class="info-card">
                <h3 id="user-fullname">...</h3>
                <p id="user-cedula" style="color: #86868b;"></p>
                <div class="status-box">
                    <b>Rango:</b> <span id="user-rango"></span><br>
                    <b>Sangre:</b> <span id="user-sangre"></span>
                </div>
                <div id="admin-link"></div>
            </div>
        </div>

        <div class="content">
            <div id="judicial-alerts"></div>
            <div class="info-card">
                <h3>Historial de Procesos Judiciales</h3>
                <div id="procesos-list">No se encontraron antecedentes activos.</div>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'login.html';

        async function loadData() {
            const res = await fetch(`/api/perfil/${user.id}`);
            const data = await res.json();

            document.getElementById('user-fullname').innerText = `${data.user.nombre} ${data.user.apellido}`;
            document.getElementById('user-cedula').innerText = `C.C. ${data.user.cedula}`;
            document.getElementById('user-rango').innerText = data.user.rango;
            document.getElementById('user-sangre').innerText = data.user.tipo_sangre;

            if (data.user.rango === 'Admin') {
                document.getElementById('admin-link').innerHTML = '<a href="admin.html" class="btn-admin">PANEL DE CONTROL FISCAL</a>';
            }

            if (data.procesos.length > 0) {
                document.getElementById('judicial-alerts').innerHTML = data.procesos.map(p => `
                    <div class="alert-red">
                        <b>⚠️ PROCESO ACTIVO:</b> ${p.asunto}<br>
                        <small>${p.detalle}</small>
                    </div>
                `).join('');
            }
        }
        loadData();
    </script>
</body>
</html>
